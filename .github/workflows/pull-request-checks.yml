name: 🔗 Pull Request Checks
on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: 🎨 Lint
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🧩 Install dependencies
        uses: ./.github/actions/setup

      - name: 🎨 Lint and format code
        shell: sh
        run: |
          bun biome ci \
          --max-diagnostics=none \
          --reporter=github

  typecheck:
    name: 🚨 Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🧩 Install dependencies
        uses: ./.github/actions/setup

      - name: 🔍 Typecheck code
        run: bun run type-check

      - name: 📖 Type-check documentation examples
        shell: sh
        run: deno task docs:type-check

      - name: 📝 Type-check markdown code blocks
        continue-on-error: true
        shell: sh
        run: deno run docs:type-check:md

  markdown:
    name: 📋 Markdown
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 📝 Lint Markdown files
        uses: DavidAnson/markdownlint-cli2-action@v21
        with:
          globs: |
            **/*.md
            !node_modules/**
            !**/node_modules/**

  tests:
    name: 🧪 Tests
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🧩 Install dependencies
        uses: ./.github/actions/setup

      - name: 🧪 Run tests
        run: bun run test --run

      - name: 📚 Run documentation tests
        continue-on-error: true
        shell: sh
        run: deno run docs:test

  docs:
    name: 📚 Docs
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🧩 Install dependencies
        uses: ./.github/actions/setup

      - name: 📚 Validate TSDoc comments
        shell: sh
        run: deno run docs:check
