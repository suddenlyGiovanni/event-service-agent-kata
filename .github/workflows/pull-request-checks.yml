name: 🔗 Pull Request Checks
on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: 🎨 Lint (Source)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🧩 Install dependencies
        uses: ./.github/actions/setup

      - name: 🎨 Lint and format source code
        shell: sh
        run: |
          bun biome ci \
          --max-diagnostics=none \
          --reporter=github

  typecheck:
    name: 🔍 Typecheck (Source)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🧩 Install dependencies
        uses: ./.github/actions/setup

      - name: 🔍 Typecheck source code
        run: bun run type-check

  markdown:
    name: 📋 Markdown
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🧩 Install dependencies
        uses: ./.github/actions/setup

      - name: 📝 Validate Markdown formatting
        shell: sh
        run: |
          bun run format:docs:markdown
          if ! git diff --quiet; then
            echo "❌ Markdown files need formatting. Run: bun run format:docs:markdown"
            git diff --stat
            exit 1
          fi

  tests:
    name: 🧪 Tests (Source)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🧩 Install dependencies
        uses: ./.github/actions/setup

      - name: 🧪 Run source code tests
        run: bun run test --run

  documentation:
    name: 📚 Documentation (All Checks)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🧩 Install dependencies
        uses: ./.github/actions/setup

      - name: 💅 Validate JSDoc formatting
        shell: sh
        run: |
          bun run format:docs:jsdoc
          if ! git diff --quiet; then
            echo "❌ JSDoc comments need formatting. Run: bun run format:docs:jsdoc"
            git diff --stat
            exit 1
          fi

      - name: 📚 Validate TSDoc structure
        shell: sh
        run: deno task docs:check

      - name: 📖 Type-check JSDoc examples
        shell: sh
        run: deno task docs:type-check

      - name: 🧪 Test JSDoc examples
        shell: sh
        run: deno task docs:test

      - name: 📝 Validate Markdown formatting
        shell: sh
        run: |
          bun run format:docs:markdown
          if ! git diff --quiet; then
            echo "❌ Markdown files need formatting. Run: bun run format:docs:markdown"
            git diff --stat
            exit 1
          fi

      - name: 📄 Type-check Markdown code blocks
        shell: sh
        run: deno task docs:type-check:md
