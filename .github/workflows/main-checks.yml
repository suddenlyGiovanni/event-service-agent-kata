name: 🎯 Main Branch Checks
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint:
    name: 🎨 Lint
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🧩 Install dependencies
        uses: ./.github/actions/setup

      - name: 🎨 Lint and format code
        shell: sh
        run: |
          bun biome ci \
          --max-diagnostics=none \
          --reporter=github

      - name: 💅 Validate comprehensive formatting
        shell: sh
        run: |
          bun run format:all
          if ! git diff --quiet; then
            echo "❌ Files need formatting. Run: bun run format:all"
            git diff --stat
            exit 1
          fi

  typecheck:
    name: 🔍 Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🧩 Install dependencies
        uses: ./.github/actions/setup

      - name: 🔍 Typecheck code
        run: bun run type-check

  tests:
    name: 🧪 Tests
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🧩 Install dependencies
        uses: ./.github/actions/setup

      - name: 🧪 Run tests
        run: bun run test --run
